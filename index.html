<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skóre">
<title>Počítadlo skóre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2e2e2e;
    --accent: #e8ff47;
    --text: #f5f5f0;
    --muted: #666;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 8px;
    flex-shrink: 0;
  }

  .app-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:active { background: var(--surface); color: var(--text); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px;
    flex-shrink: 0;
  }

  .teams {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow: hidden;
  }

  .team {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .team:last-child { border-bottom: none; }

  .team-name-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    text-align: center;
    background: none;
    border: none;
    border-bottom: 1px solid transparent;
    color: var(--muted);
    outline: none;
    width: 160px;
    padding: 2px 4px;
    transition: border-color 0.2s, color 0.2s;
    text-transform: uppercase;
  }
  .team-name:focus {
    border-bottom-color: var(--accent);
    color: var(--text);
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .score-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 32px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, transform 0.1s;
    user-select: none;
    -webkit-user-select: none;
  }
  .score-btn:active {
    background: #2a2a2a;
    transform: scale(0.92);
  }
  .score-btn.plus {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0f0f;
    font-size: 36px;
    font-weight: 700;
  }
  .score-btn.plus:active {
    background: #cce035;
    transform: scale(0.92);
  }

  .score-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 100px;
    line-height: 1;
    width: 150px;
    text-align: center;
    color: var(--text);
    letter-spacing: -2px;
    transition: transform 0.08s;
  }
  .score-value.bump {
    transform: scale(1.12);
  }

  .sep {
    height: 1px;
    background: var(--border);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <span class="app-title">KLÍŠŤATA</span>
  <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
</header>
<div class="divider"></div>

<div class="teams">
  <div class="team" id="team1">
    <div class="team-name-wrap">
      <input class="team-name" id="name1" value="TÝM 1" maxlength="16" spellcheck="false">
    </div>
    <div class="score-row">
      <button class="score-btn minus" onclick="change(1,-1)">−</button>
      <div class="score-value" id="score1">0</div>
      <button class="score-btn plus" onclick="change(1,1)">+</button>
    </div>
  </div>

  <div class="sep"></div>

  <div class="team" id="team2">
    <div class="team-name-wrap">
      <input class="team-name" id="name2" value="TÝM 2" maxlength="16" spellcheck="false">
    </div>
    <div class="score-row">
      <button class="score-btn minus" onclick="change(2,-1)">−</button>
      <div class="score-value" id="score2">0</div>
      <button class="score-btn plus" onclick="change(2,1)">+</button>
    </div>
  </div>
</div>

<script>
  var scores = [0, 0];

  function save() {
    localStorage.setItem('kliste_scores', JSON.stringify(scores));
    localStorage.setItem('kliste_name1', document.getElementById('name1').value);
    localStorage.setItem('kliste_name2', document.getElementById('name2').value);
  }

  function load() {
    var s = localStorage.getItem('kliste_scores');
    if (s) {
      scores = JSON.parse(s);
      document.getElementById('score1').textContent = scores[0];
      document.getElementById('score2').textContent = scores[1];
    }
    var n1 = localStorage.getItem('kliste_name1');
    var n2 = localStorage.getItem('kliste_name2');
    if (n1) document.getElementById('name1').value = n1;
    if (n2) document.getElementById('name2').value = n2;
  }

  function change(team, delta) {
    var idx = team - 1;
    scores[idx] = Math.max(0, scores[idx] + delta);
    var el = document.getElementById('score' + team);
    el.textContent = scores[idx];
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');
    setTimeout(function(){ el.classList.remove('bump'); }, 120);
    save();
  }

  function resetAll() {
    scores = [0, 0];
    document.getElementById('score1').textContent = '0';
    document.getElementById('score2').textContent = '0';
    save();
  }

  document.querySelectorAll('.team-name').forEach(function(inp) {
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') inp.blur();
    });
    inp.addEventListener('input', save);
  });

  load();

  if ('serviceWorker' in navigator) {
    var sw = 'data:application/javascript,' + encodeURIComponent(
      'self.addEventListener("install",function(e){e.waitUntil(caches.open("skore-v1").then(function(c){return c.addAll([])}))});' +
      'self.addEventListener("fetch",function(e){e.respondWith(fetch(e.request).catch(function(){return caches.match(e.request)}))});'
    );
    navigator.serviceWorker.register(sw, {scope: './'}).catch(function(){});
  }
</script>
</body>
</html>
